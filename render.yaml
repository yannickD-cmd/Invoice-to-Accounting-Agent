services:
  - type: web
    name: invoice-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: DATABASE_URL
        fromDatabase:
          name: invoice-agent-db
          property: connectionString

databases:
  - name: invoice-agent-db
    plan: starter
    postgresMajorVersion: 16
